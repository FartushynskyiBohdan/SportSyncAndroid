name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            set -e
            cd ~/SportSync-Dating-for-Athletes
            git stash --include-untracked || true
            git pull
            cd backend
            npm install --production
            sudo systemctl stop sportsync
            sleep 2
            sudo systemctl start sportsync

