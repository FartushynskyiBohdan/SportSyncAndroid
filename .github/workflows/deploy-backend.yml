name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            set -e
            cd ~/SportSync-Dating-for-Athletes
            git stash --include-untracked || true
            git pull
            cd backend
            npm install --production
            # Clear any stale process occupying port 3000 (e.g. a manually started node process
            # from a previous session) so systemctl restart does not fail with EADDRINUSE.
            sudo fuser -k 3000/tcp || true
            sudo systemctl restart sportsync

